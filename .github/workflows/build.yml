name: Build TeleKill APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;21.4.7075529"
          echo "y" | sdkmanager "cmake;3.22.1"

      - name: Set up API keys
        run: |
          echo "APP_ID=${{ secrets.TELEGRAM_API_ID }}" >> local.properties
          echo "APP_HASH=${{ secrets.TELEGRAM_API_HASH }}" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :TMessagesProj:assembleAfatDebug --stacktrace
        env:
          GRADLE_OPTS: "-Xmx3g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TeleKill-debug
          path: TMessagesProj/build/outputs/apk/**/*.apk
          retention-days: 7
